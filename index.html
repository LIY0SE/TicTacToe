<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | Premium Edition</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --x-color: #38bdf8;
            --o-color: #f472b6;
            --winner-highlight: rgba(99, 102, 241, 0.3);
            --glow: 0 0 20px rgba(99, 102, 241, 0.2);
            --cell-bg: rgba(255, 255, 255, 0.03);
            --cell-border: rgba(255, 255, 255, 0.05);
            --cell-hover: rgba(255, 255, 255, 0.08);
        }

        .light-theme {
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --glow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --cell-bg: #ffffff;
            --cell-border: rgba(99, 102, 241, 0.1);
            --cell-hover: rgba(99, 102, 241, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            overflow: hidden;
        }

        .light-theme body {
            background-image: none;
        }

        .user-name {
            position: fixed;
            top: 2rem;
            left: 2rem;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
            opacity: 0.8;
            z-index: 10;
        }

        .container {
            text-align: center;
            backdrop-filter: blur(12px);
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), var(--glow);
            max-width: 450px;
            width: 90%;
            animation: fadeIn 0.8s ease-out, glowPulse 3s infinite ease-in-out;
            position: relative;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 20px rgba(99, 102, 241, 0.2); }
            50% { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(168, 85, 247, 0.4); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            height: 1.5rem;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 2rem;
        }

        .cell {
            aspect-ratio: 1;
            background: var(--cell-bg);
            border: 1px solid var(--cell-border);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .cell:hover:not(.filled) {
            background: var(--cell-hover);
            transform: scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .cell.filled {
            cursor: default;
        }

        .cell.x {
            color: var(--x-color);
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .cell.o {
            color: var(--o-color);
            text-shadow: 0 0 20px rgba(244, 114, 182, 0.4);
        }

        .cell.winner {
            background: var(--winner-highlight);
            border-color: var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        .main-btns {
            display: flex;
            gap: 1rem;
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        .settings-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 1rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* Responsive */
        @media (max-width: 400px) {
            .container {
                padding: 1.5rem;
            }
            h1 {
                font-size: 2rem;
            }
            .cell {
                font-size: 2rem;
            }
            .user-name {
                top: 1rem;
                left: 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="user-name">User</div>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        <div class="status" id="status">Player X's Turn</div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <div class="main-btns">
                <button id="restart">Restart Game</button>
            </div>
            
            <div class="settings-panel">
                <div class="setting-item">
                    <span>Dark/Light Mode</span>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span>AI Mode</span>
                    <label class="switch">
                        <input type="checkbox" id="ai-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const restartButton = document.getElementById('restart');
        const themeToggle = document.getElementById('theme-toggle');
        const aiToggle = document.getElementById('ai-toggle');
        const cells = document.querySelectorAll('.cell');

        let currentPlayer = 'X';
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;
        let isAiMode = false;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        // Theme Toggle Logic
        themeToggle.addEventListener('change', () => {
            document.documentElement.classList.toggle('light-theme');
        });

        // AI Mode Toggle
        aiToggle.addEventListener('change', (e) => {
            isAiMode = e.target.checked;
            handleRestartGame();
        });

        function handleCellClick(clickedCellEvent) {
            const clickedCell = clickedCellEvent.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (gameState[clickedCellIndex] !== "" || !gameActive || (isAiMode && currentPlayer === 'O')) {
                return;
            }

            handleCellPlayed(clickedCell, clickedCellIndex);
            if (handleResultValidation()) return;

            if (isAiMode && gameActive) {
                setTimeout(makeAiMove, 600);
            }
        }

        function handleCellPlayed(clickedCell, clickedCellIndex) {
            gameState[clickedCellIndex] = currentPlayer;
            clickedCell.innerText = currentPlayer;
            clickedCell.classList.add('filled', currentPlayer.toLowerCase());
        }

        function handleResultValidation() {
            let roundWon = false;
            let winningCombo = [];

            for (let i = 0; i <= 7; i++) {
                const winCondition = winningConditions[i];
                let a = gameState[winCondition[0]];
                let b = gameState[winCondition[1]];
                let c = gameState[winCondition[2]];
                if (a === '' || b === '' || c === '') continue;
                if (a === b && b === c) {
                    roundWon = true;
                    winningCombo = winCondition;
                    break;
                }
            }

            if (roundWon) {
                statusElement.innerText = `Player ${currentPlayer} Wins!`;
                statusElement.style.color = currentPlayer === 'X' ? 'var(--x-color)' : 'var(--o-color)';
                highlightWinner(winningCombo);
                gameActive = false;
                return true;
            }

            let roundDraw = !gameState.includes("");
            if (roundDraw) {
                statusElement.innerText = "Game Draw!";
                statusElement.style.color = "var(--text-secondary)";
                gameActive = false;
                return true;
            }

            handlePlayerChange();
            return false;
        }

        function highlightWinner(combo) {
            combo.forEach(index => {
                cells[index].classList.add('winner');
            });
        }

        function handlePlayerChange() {
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusElement.innerText = `Player ${currentPlayer}'s Turn`;
        }

        // AI Logic (Minimax)
        function makeAiMove() {
            const bestMove = getBestMove(gameState, 'O');
            const clickedCell = document.querySelector(`.cell[data-index="${bestMove.index}"]`);
            handleCellPlayed(clickedCell, bestMove.index);
            handleResultValidation();
        }

        function getBestMove(board, player) {
            const availSpots = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);

            if (checkWin(board, 'X')) return { score: -10 };
            if (checkWin(board, 'O')) return { score: 10 };
            if (availSpots.length === 0) return { score: 0 };

            const moves = [];
            for (let i = 0; i < availSpots.length; i++) {
                const move = { index: availSpots[i] };
                board[availSpots[i]] = player;

                if (player === 'O') {
                    const result = getBestMove(board, 'X');
                    move.score = result.score;
                } else {
                    const result = getBestMove(board, 'O');
                    move.score = result.score;
                }

                board[availSpots[i]] = "";
                moves.push(move);
            }

            let bestMove;
            if (player === 'O') {
                let bestScore = -10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score > bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            } else {
                let bestScore = 10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score < bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            }
            return moves[bestMove];
        }

        function checkWin(board, player) {
            return winningConditions.some(condition => {
                return condition.every(index => board[index] === player);
            });
        }

        function handleRestartGame() {
            gameActive = true;
            currentPlayer = "X";
            gameState = ["", "", "", "", "", "", "", "", ""];
            statusElement.innerText = "Player X's Turn";
            statusElement.style.color = "var(--text-secondary)";
            cells.forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('filled', 'x', 'o', 'winner');
            });
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        restartButton.addEventListener('click', handleRestartGame);
    </script>
</body>
</html>
